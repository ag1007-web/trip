    // ── Helpers ──────────────────────────────────────────────────────────────────
    function formatTime(iso) {
      if (!iso) return "";
      try {
        const d = new Date(iso);
        return d.toLocaleString("zh-TW", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" });
      } catch { return ""; }
    }

    const DAY_COLORS = ["#e07b3a", "#4aab7a", "#3a8fbf", "#9b6bbf"];

    const C = {
      bg: "#f0ebe0", bgCard: "#faf7f2", bgCardDone: "#ede9e1",
      green: "#4aab7a", greenDark: "#357a57", greenLight: "#e8f5ee", greenBand: "#4aab7a",
      border: "#d8cfc0", borderCard: "#e2dbd0",
      text: "#3a3028", textMid: "#7a6e62", textLight: "#a89e93",
      accent: "#e07b3a",
      wood: "repeating-linear-gradient(90deg,rgba(180,155,110,0.07) 0px,rgba(180,155,110,0.07) 1px,transparent 1px,transparent 40px)",
    };

    function getWeatherIcon(code) {
      if (code === 0)  return { icon: "☀️", label: "晴天" };
      if (code <= 2)   return { icon: "🌤️", label: "晴時多雲" };
      if (code <= 3)   return { icon: "☁️",  label: "陰天" };
      if (code <= 49)  return { icon: "🌫️", label: "霧" };
      if (code <= 59)  return { icon: "🌦️", label: "毛毛雨" };
      if (code <= 69)  return { icon: "🌧️", label: "雨天" };
      if (code <= 79)  return { icon: "🌨️", label: "雪" };
      if (code <= 84)  return { icon: "🌦️", label: "陣雨" };
      if (code <= 99)  return { icon: "⛈️",  label: "雷雨" };
      return { icon: "🌡️", label: "未知" };
    }

    function fmtDay(dateStr) {
      if (!dateStr) return "";
      const d = new Date(dateStr);
      const wd = ["日","一","二","三","四","五","六"];
      return `${d.getMonth()+1}/${d.getDate()}（${wd[d.getDay()]}）`;
    }

        try {
          const saved = localStorage.getItem("osaka-trip-v16-weather");
          setTrip(saved ? JSON.parse(saved) : DEFAULT_TRIP);

        setLoaded(true);

              <div style={{ marginTop: 12, background: "white", border: `1.5px solid ${C.border}`, borderRadius: 12, padding: "10px 14px", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, boxShadow: "0 1px 4px rgba(0,0,0,0.04)" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, minWidth: 0 }}>
                  <span style={{ width: 34, height: 34, borderRadius: "50%", background: C.greenLight, border: `1.5px solid ${C.green}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 17, flexShrink: 0 }}>🏨</span>
                  <div style={{ minWidth: 0 }}>
                    <div style={{ fontSize: 12, fontWeight: 700, color: C.text }}>住宿地點</div>
                    <div style={{ fontSize: 11, color: C.textMid, marginTop: 1, lineHeight: 1.4 }}>〒556-0006 大阪市浪速区日本橋東3丁目6番</div>
                    <div style={{ fontSize: 10, color: C.textLight, marginTop: 1 }}>搭計程車時可直接出示此日文地址給司機</div>
                  </div>
                </div>
                <a href="https://www.google.com/maps?q=34.657529193809,135.508101335582" target="_blank" rel="noopener noreferrer"
                  style={{ flexShrink: 0, background: C.greenLight, border: `1.5px solid ${C.green}`, color: C.greenDark, borderRadius: 16, padding: "5px 12px", fontSize: 11, fontWeight: 700, textDecoration: "none", whiteSpace: "nowrap" }}>
                  地圖 ↗
                </a>
              </div>

              <div style={{ marginTop: 10, marginBottom: 0 }}>
                {weather ? (
                  <>
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 6 }}>
                      {weather.map((w, i) => (
                          <div key={i} style={{ background: "white", border: `1.5px solid ${w.rain >= 70 ? C.accent + "66" : C.border}`, borderRadius: 10, padding: "8px 6px", textAlign: "center", boxShadow: "0 1px 3px rgba(0,0,0,0.03)" }}>
                            <div style={{ fontSize: 9.5, color: C.textLight, marginBottom: 3 }}>{fmtDay(w.date)}</div>
                            <div style={{ fontSize: 22, lineHeight: 1.15 }}>{w.icon}</div>
                            <div style={{ fontSize: 9, color: C.textMid, marginTop: 2 }}>{w.label}</div>
                            <div style={{ fontSize: 13, fontWeight: 700, color: C.text, marginTop: 3 }}>
                              {w.max}° <span style={{ fontSize: 11, color: C.textLight, fontWeight: 400 }}>{w.min}°</span>
                            </div>
                            <div style={{ fontSize: 9.5, marginTop: 2, fontWeight: w.rain >= 70 ? 700 : 400, color: w.rain >= 70 ? C.accent : C.textLight }}>💧 {w.rain}%</div>
                          </div>
                        ))}
                    </div>
                    <div style={{ fontSize: 9.5, color: C.textLight, textAlign: "center", marginTop: 6, lineHeight: 1.5 }}>
                      ☔ 梅雨前線影響，4天皆有降雨機率，預報資料更新於 6/21，出發前請再次確認最新預報
                    </div>
                  </>
                ) : (
                  <div style={{ fontSize: 11, color: C.textLight, textAlign: "center", padding: "8px 0" }}>天氣資料載入中…</div>
                )}
              </div>

              <div style={{ display: "flex", marginTop: 12, overflowX: "auto", paddingBottom: 2 }}>
                {[
                  { id: "itinerary", label: "📅 每日行程" }, 
                  { id: "restaurants", label: "🍽 餐廳推薦" }, 
                  { id: "flights", label: "✈️ 班機" },
                  { id: "accommodation", label: "🏨 住宿" }
                ].map(t => (
                  <button key={t.id} onClick={() => setMainTab(t.id)} style={{
                    flex: 1, padding: "10px 2px", border: "none", cursor: "pointer", fontSize: 12,
                    fontWeight: mainTab === t.id ? 700 : 400,
                    color: mainTab === t.id ? C.green : C.textMid,
                    background: "transparent",
                    borderBottom: mainTab === t.id ? `3px solid ${C.green}` : `3px solid ${C.border}`,
                    transition: "all 0.15s",
                    minWidth: "75px",
                    whiteSpace: "nowrap"
                  }}>{t.label}</button>
                ))}
              </div>

              {(mainTab === "itinerary" || mainTab === "restaurants") && trip && trip.days && (
                <div style={{ display: "flex", gap: 6, padding: "12px 0 12px", overflowX: "auto" }}>
                  {trip.days.map((day, i) => {
                    const dc = DAY_COLORS[i];
                    const active = activeDay === i;
                    return (
                      <button key={day.id} onClick={() => setActiveDay(i)} style={{
                        background: active ? dc : "white", border: `1.5px solid ${active ? dc : C.border}`,
                        color: active ? "#fff" : C.textMid, padding: "6px 14px", borderRadius: 20,
                        cursor: "pointer", fontSize: 12, fontWeight: active ? 700 : 400, whiteSpace: "nowrap",
                        transition: "all 0.18s", boxShadow: active ? `0 2px 8px ${dc}44` : "none",
                      }}>{day.emoji} {day.label}</button>
                    );
                  })}
                </div>
              )}
            </div>
          </div>

          <div style={{ maxWidth: 680, margin: "0 auto", padding: "18px 16px 0" }}>

            {/* ITINERARY */}
            {mainTab === "itinerary" && todayData && (
              <>
                <div style={{ background: `linear-gradient(135deg,${activeColor}18,${activeColor}08)`, border: `1.5px solid ${activeColor}44`, borderRadius: 14, padding: "14px 18px", marginBottom: 16, display: "flex", alignItems: "center", gap: 14 }}>
                  <div style={{ width: 46, height: 46, borderRadius: "50%", background: `${activeColor}22`, border: `2px solid ${activeColor}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, flexShrink: 0 }}>{todayData.emoji}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 10, letterSpacing: 4, color: activeColor, textTransform: "uppercase", fontWeight: 700 }}>{todayData.date}</div>
                    <div style={{ fontSize: 16, fontWeight: 700, marginTop: 2 }}>{todayData.theme}</div>
                  </div>
                  {todayData.spots && todayData.spots.length > 0 && (
                    <div style={{ textAlign: "right", flexShrink: 0 }}>
                      <div style={{ fontSize: 18, fontWeight: 800, color: activeColor }}>{todayData.spots.filter(s=>s.done).length}<span style={{ fontSize: 12, color: C.textLight }}>/{todayData.spots.length}</span></div>
                      <div style={{ fontSize: 9, color: C.textLight, letterSpacing: 1 }}>已完成</div>
                    </div>
                  )}
                </div>

                <div style={{ position: "relative" }}>
                  <div style={{ position: "absolute", left: 40, top: 8, bottom: 8, width: 2, background: `linear-gradient(to bottom,${activeColor}88,${activeColor}22)`, borderRadius: 2 }} />
                  {todayData.spots && todayData.spots.map((spot, si) => (
                    <div key={si} style={{ display: "flex", marginBottom: 11, alignItems: "flex-start" }}>
                      <div style={{ width: 32, textAlign: "right", flexShrink: 0, paddingTop: 10 }}>
                        <span style={{ fontSize: 9.5, color: C.textLight }}>{spot.time}</span>
                      </div>
                      <div style={{ width: 18, flexShrink: 0, display: "flex", justifyContent: "center", paddingTop: 10 }}>
                        <div onClick={() => toggleDone(activeDay, si)} style={{ width: 14, height: 14, borderRadius: "50%", background: spot.done ? activeColor : "white", border: `2px solid ${spot.done ? activeColor : C.border}`, cursor: "pointer", transition: "all 0.2s", zIndex: 1, boxShadow: spot.done ? `0 0 0 3px ${activeColor}22` : "none" }} />
                      </div>
                      <div style={{ flex: 1, marginLeft: 8, background: spot.done ? C.bgCardDone : C.bgCard, border: `1px solid ${spot.done ? C.border : C.borderCard}`, borderLeft: `3px solid ${spot.done ? C.border : activeColor}`, borderRadius: 10, padding: "10px 14px", opacity: spot.done ? 0.6 : 1, transition: "all 0.25s", boxShadow: spot.done ? "none" : "0 1px 4px rgba(0,0,0,0.05)" }}>
                        <div style={{ display: "flex", alignItems: "flex-start", gap: 6 }}>
                          <div style={{ fontSize: 14, fontWeight: 600, textDecoration: spot.done ? "line-through" : "none", color: spot.done ? C.textLight : C.text, lineHeight: 1.4, flex: 1 }}>{spot.name}</div>
                          {spot.pass && (
                            <span style={{ background: C.greenLight, border: `1px solid ${C.green}44`, color: C.greenDark, fontSize: 9, padding: "2px 6px", borderRadius: 6, fontWeight: 700, whiteSpace: "nowrap", flexShrink: 0 }}>
                              周遊卡免費
                            </span>
                          )}
                        </div>
                        {spot.note && <div style={{ fontSize: 11.5, color: C.textMid, marginTop: 4, lineHeight: 1.5 }}>{spot.note}</div>}
                        
                        {(spot.mapUrl || spot.address) && (
                          <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 8, flexWrap: "wrap" }}>
                            {spot.mapUrl && (
                              <a href={spot.mapUrl} target="_blank" rel="noopener noreferrer" onClick={e => e.stopPropagation()}
                                style={{ fontSize: 10, background: C.greenLight, color: C.greenDark, textDecoration: "none", padding: "3px 8px", borderRadius: 10, fontWeight: 600, border: `1px solid ${C.green}44`, display: "flex", alignItems: "center", gap: 3 }}>
                                📍 地圖
                              </a>
                            )}
                            {spot.address && (
                              <span style={{ fontSize: 10, color: C.textMid, background: "#f5f5f5", padding: "3px 8px", borderRadius: 10, border: `1px solid ${C.border}`, lineHeight: 1.2 }}>
                                {spot.address}
                              </span>
                            )}
                          </div>
                        )}

                        {!spot.done && <div style={{ fontSize: 9.5, color: C.textLight, marginTop: 6 }}>點擊圓點標記完成</div>}
                      </div>
                    </div>
                  ))}
                </div>

                {todayData.spots && todayData.spots.length > 0 && (
                  <div style={{ marginTop: 16, padding: "12px 16px", background: C.bgCard, borderRadius: 12, border: `1px solid ${C.border}` }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                      <span style={{ fontSize: 11, letterSpacing: 2, color: C.textMid, fontWeight: 600 }}>今日進度</span>
                      <span style={{ fontSize: 11, color: C.textLight }}>{Math.round((todayData.spots.filter(s=>s.done).length / todayData.spots.length)*100)}%</span>
                    </div>
                    <div style={{ height: 6, background: C.bgCardDone, borderRadius: 3, overflow: "hidden" }}>
                      <div style={{ height: "100%", borderRadius: 3, width: `${(todayData.spots.filter(s=>s.done).length/todayData.spots.length)*100}%`, background: `linear-gradient(90deg,${activeColor},${activeColor}bb)`, transition: "width 0.5s ease" }} />
                    </div>
                  </div>
                )}

                <div style={{ marginTop: 18, padding: "14px 16px", background: C.greenLight, borderRadius: 12, border: `1px solid ${C.green}33` }}>
                  <div style={{ fontSize: 10, letterSpacing: 3, color: C.green, textTransform: "uppercase", fontWeight: 700, marginBottom: 7 }}>{todayData.date} 小提醒 & 雨天備案</div>
                  <div style={{ fontSize: 13, color: C.greenDark, lineHeight: 1.8, whiteSpace: "pre-wrap" }}>{todayData.rainBackup}</div>
                </div>
              </>
            )}

            {/* RESTAURANTS */}
            {mainTab === "restaurants" && trip && trip.days && (
              <div>
                {trip.days[activeDay] && (
                  <div style={{ marginBottom: 14, paddingLeft: 2 }}>
                    <span style={{ fontSize: 11, color: activeColor, fontWeight: 700, letterSpacing: 1 }}>
                      {trip.days[activeDay].date} — {trip.days[activeDay].theme}
                    </span>
                    <span style={{ fontSize: 11, color: C.textLight, marginLeft: 8 }}>
                      共 {(trip.days[activeDay].restaurants || []).length} 間推薦
                    </span>
                  </div>
                )}

                {trip.days[activeDay] && (!trip.days[activeDay].restaurants || trip.days[activeDay].restaurants.length === 0) ? (
                  <div style={{ textAlign: "center", color: C.textLight, fontSize: 13, padding: "40px 0" }}>
                    這天尚未設定餐廳推薦
                  </div>
                ) : (
                  trip.days[activeDay] && trip.days[activeDay].restaurants && trip.days[activeDay].restaurants.map((r, i) => (
                    <DayRestaurantCard key={i} r={r} color={activeColor} />
                  ))
                )}
              </div>
            )}

            {/* FLIGHTS */}
            {mainTab === "flights" && (
              <div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 16 }}>
                  {FLIGHTS.bookings.map((b, bi) => (
                    <div key={bi} style={{ background: C.bgCard, border: `1.5px solid ${C.borderCard}`, borderRadius: 12, padding: "12px 14px", boxShadow: "0 1px 4px rgba(0,0,0,0.04)" }}>
                      <div style={{ fontSize: 9, letterSpacing: 2, color: C.green, textTransform: "uppercase", fontWeight: 700, marginBottom: 4 }}>{b.label}</div>
                      <div style={{ fontSize: 18, fontWeight: 800, color: C.text, letterSpacing: 2, marginBottom: 2 }}>{b.reservationCode}</div>
                      {b.pnr && <div style={{ fontSize: 10, color: C.textMid, marginBottom: 8 }}>PNR <span style={{ fontWeight: 700, color: C.accent }}>{b.pnr}</span></div>}
                      {!b.pnr && <div style={{ marginBottom: 8 }} />}
                      {b.passengers && b.passengers.map((p, pi) => (
                        <div key={pi} style={{ marginBottom: 7 }}>
                          <div style={{ fontSize: 11.5, fontWeight: 600, color: C.text }}>{p.name}</div>
                          <div style={{ fontSize: 9.5, color: C.textLight, fontFamily: "monospace", marginTop: 1 }}>{p.eTicket}</div>
                          {p.baggage && <div style={{ fontSize: 10, color: C.green, fontWeight: 600, marginTop: 2 }}>🧳 {p.baggage}</div>}
                        </div>
                      ))}
                    </div>
                  ))}
                </div>

                {[FLIGHTS.outbound, FLIGHTS.inbound].map((leg, li) => (
                  <div key={li} style={{ marginBottom: 20 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                      <div style={{ width: 28, height: 28, borderRadius: "50%", background: li === 0 ? "#fff7f0" : C.greenLight, border: `2px solid ${li === 0 ? C.accent : C.green}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 14 }}>
                        {li === 0 ? "🛫" : "🛬"}
                      </div>
                      <div>
                        <div style={{ fontSize: 13, fontWeight: 700, color: C.text }}>{leg.label}</div>
                        <div style={{ fontSize: 11, color: C.textLight }}>{leg.date}</div>
                      </div>
                    </div>

                    {leg.segments.map((seg, si) => (
                      <div key={si} style={{ background: C.bgCard, border: `1.5px solid ${C.borderCard}`, borderRadius: 14, overflow: "hidden", boxShadow: "0 2px 6px rgba(0,0,0,0.04)" }}>
                        <div style={{ background: li === 0 ? "#fff7f0" : C.greenLight, padding: "9px 16px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                          <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
                            <span style={{ fontSize: 15, fontWeight: 800, color: li === 0 ? C.accent : C.greenDark, letterSpacing: 1 }}>{seg.no}</span>
                            <span style={{ fontSize: 11, color: li === 0 ? "#c0623a" : C.greenDark }}>{seg.airline}</span>
                          </div>
                          <div style={{ textAlign: "right" }}>
                            <div style={{ fontSize: 10, color: li === 0 ? "#c0623a" : C.greenDark }}>{seg.aircraft}</div>
                            <div style={{ fontSize: 10, color: li === 0 ? "#c0623a" : C.greenDark }}>{seg.cabin}</div>
                          </div>
                        </div>

                        <div style={{ padding: "16px 16px 12px" }}>
                          <div style={{ display: "flex", alignItems: "center" }}>
                            <div style={{ flex: 1 }}>
                              <div style={{ fontSize: 28, fontWeight: 800, color: C.text, letterSpacing: -1, lineHeight: 1 }}>{seg.from.time}</div>
                              <div style={{ fontSize: 20, fontWeight: 700, color: li === 0 ? C.accent : C.green, marginTop: 3 }}>{seg.from.code}</div>
                              <div style={{ fontSize: 10, color: C.textMid, marginTop: 2, lineHeight: 1.4 }}>{seg.from.name}</div>
                              <div style={{ fontSize: 10, color: C.green, fontWeight: 600, marginTop: 2 }}>{seg.from.terminal}</div>
                            </div>
                            <div style={{ flexShrink: 0, textAlign: "center", padding: "0 8px" }}>
                              <div style={{ fontSize: 9.5, color: C.textLight, marginBottom: 5 }}>{seg.duration}</div>
                              <div style={{ display: "flex", alignItems: "center" }}>
                                <div style={{ height: 1.5, width: 44, background: `linear-gradient(90deg,${li===0?C.accent:C.green}55,${li===0?C.accent:C.green})` }} />
                                <span style={{ fontSize: 16, lineHeight: 1 }}>✈</span>
                              </div>
                              <div style={{ fontSize: 9, color: C.textLight, marginTop: 4 }}>直飛</div>
                            </div>
                            <div style={{ flex: 1, textAlign: "right" }}>
                              <div style={{ fontSize: 28, fontWeight: 800, color: C.text, letterSpacing: -1, lineHeight: 1 }}>{seg.to.time}</div>
                              <div style={{ fontSize: 20, fontWeight: 700, color: li === 0 ? C.accent : C.green, marginTop: 3 }}>{seg.to.code}</div>
                              <div style={{ fontSize: 10, color: C.textMid, marginTop: 2, lineHeight: 1.4 }}>{seg.to.name}</div>
                              <div style={{ fontSize: 10, color: C.green, fontWeight: 600, marginTop: 2 }}>{seg.to.terminal}</div>
                            </div>
                          </div>
                          {seg.note && (
                            <div style={{ marginTop: 12, padding: "9px 12px", background: li === 0 ? "#fff7f0" : C.greenLight, borderRadius: 8, fontSize: 11.5, color: li === 0 ? C.accent : C.greenDark, lineHeight: 1.7 }}>
                              💡 {seg.note}
                            </div>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>
                ))}

                <div style={{ background: C.bgCard, border: `1.5px solid ${C.borderCard}`, borderRadius: 14, padding: "14px 16px", marginBottom: 12, boxShadow: "0 2px 6px rgba(0,0,0,0.04)" }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: C.accent, letterSpacing: 2, marginBottom: 10, textTransform: "uppercase" }}>⚠️ 行李規定</div>
                  {FLIGHTS.baggage.map((b, i) => (
                    <div key={i} style={{ fontSize: 12.5, color: C.textMid, marginBottom: 6, lineHeight: 1.6, paddingLeft: 8, borderLeft: `2.5px solid ${C.accent}` }}>{b}</div>
                  ))}
                </div>

                <div style={{ background: C.bgCard, border: `1.5px solid ${C.borderCard}`, borderRadius: 14, padding: "14px 16px", boxShadow: "0 2px 6px rgba(0,0,0,0.04)" }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: C.green, letterSpacing: 2, marginBottom: 10, textTransform: "uppercase" }}>出發前確認清單</div>
                  {FLIGHTS.reminders.map((r, i) => (
                    <div key={i} style={{ fontSize: 12.5, color: C.textMid, marginBottom: 7, lineHeight: 1.6 }}>{r}</div>
                  ))}
                </div>

              </div>
            )}

            {/* ACCOMMODATION */}
            {mainTab === "accommodation" && (
              <div>
                <div style={{ background: C.bgCard, border: `1.5px solid ${C.borderCard}`, borderRadius: 14, padding: "16px", marginBottom: 16, boxShadow: "0 2px 6px rgba(0,0,0,0.04)" }}>
                  
                  {/* Header */}
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
                    <div>
                      <div style={{ fontSize: 10, letterSpacing: 2, color: C.green, textTransform: "uppercase", fontWeight: 700, marginBottom: 4 }}>合法私人旅館</div>
                      <div style={{ fontSize: 22, fontWeight: 800, color: C.text }}>{ACCOMMODATION.name}</div>
                      <div style={{ fontSize: 13, color: C.textMid, marginTop: 4, fontWeight: 600 }}>{ACCOMMODATION.room} • {ACCOMMODATION.capacity}</div>
                    </div>
                    <div style={{ fontSize: 32 }}>🏠</div>
                  </div>

                  {/* Address & Map */}
                  <div style={{ background: C.greenLight, padding: "10px 12px", borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, marginBottom: 14 }}>
                    <div style={{ fontSize: 12, color: C.greenDark, lineHeight: 1.4, fontWeight: 600 }}>
                      📍 {ACCOMMODATION.address}
                    </div>
                    <a href={ACCOMMODATION.mapUrl} target="_blank" rel="noopener noreferrer"
                      style={{ flexShrink: 0, background: "#fff", border: `1px solid ${C.green}`, color: C.greenDark, borderRadius: 16, padding: "4px 10px", fontSize: 11, fontWeight: 700, textDecoration: "none" }}>
                      地圖 ↗
                    </a>
                  </div>

                  {/* Website link */}
                  <div style={{ marginBottom: 16 }}>
                     <a href={ACCOMMODATION.website} target="_blank" rel="noopener noreferrer"
                      style={{ display: "inline-flex", alignItems: "center", gap: 6, fontSize: 12, color: "#fff", background: C.green, padding: "8px 16px", borderRadius: 20, textDecoration: "none", fontWeight: 700, boxShadow: `0 2px 8px ${C.green}55` }}>
                      🌐 前往官方網站 / 住宿指南 ↗
                     </a>
                  </div>

                  {/* Description */}
                  <div style={{ fontSize: 13, color: C.textMid, lineHeight: 1.7, marginBottom: 18 }}>
                    {ACCOMMODATION.description}
                  </div>

                  {/* Amenities */}
                  <div>
                    <div style={{ fontSize: 11, fontWeight: 700, color: C.textLight, marginBottom: 10, textTransform: "uppercase", letterSpacing: 1 }}>全方位設施</div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                      {ACCOMMODATION.amenities.map((item, i) => (
                        <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12, color: C.text, fontWeight: 600 }}>
                          <span style={{ fontSize: 16 }}>{item.icon}</span> {item.label}
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                {/* Reminders */}
                <div style={{ background: C.bgCard, border: `1.5px solid ${C.borderCard}`, borderRadius: 14, padding: "14px 16px", boxShadow: "0 2px 6px rgba(0,0,0,0.04)" }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: C.accent, letterSpacing: 2, marginBottom: 10, textTransform: "uppercase" }}>⚠️ 入住重要提醒</div>
                  {ACCOMMODATION.reminders.map((r, i) => (
                    <div key={i} style={{ fontSize: 12.5, color: C.textMid, marginBottom: 6, lineHeight: 1.6, paddingLeft: 8, borderLeft: `2.5px solid ${C.accent}` }}>{r}</div>
                  ))}
                </div>

              </div>
            )}
          </div>

          <div style={{ marginTop: 40, background: C.greenBand, height: 8 }} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<OsakaTrip />);
  </script>
</body>
</html>
